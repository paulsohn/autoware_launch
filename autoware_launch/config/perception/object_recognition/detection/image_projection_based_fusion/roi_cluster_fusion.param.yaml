# This file is managed by workflow.
# Keys marked with '{OVERRIDE}' or '# {OVERRIDE: reason}' are persisted as variant overrides.
# 'reason' can be any single-line text without braces.
# To keep local changes, annotate fields with '# {OVERRIDE}' or '# {OVERRIDE: reason}'.
#
# Source: https://github.com/autowarefoundation/autoware_universe/blob/5f8a2a267517bfb4e3cdac0263a38eef53dc982e/perception/autoware_image_projection_based_fusion/config/roi_cluster_fusion.param.yaml

/**:
  ros__parameters:
    fusion_distance: 100.0
    strict_iou_fusion_distance: 100.0
    strict_iou_match_mode: "iou"
    rough_iou_match_mode: "iou_x"
    use_cluster_semantic_type: false
    only_allow_inside_cluster: true
    roi_scale_factor: 1.1
    iou_threshold:
      UNKNOWN : 0.1
      CAR : 0.65
      TRUCK : 0.65
      BUS : 0.65
      TRAILER : 0.65
      MOTORCYCLE : 0.65
      BICYCLE : 0.65
      PEDESTRIAN : 0.4 # {OVERRIDE}
    remove_unknown: false # {OVERRIDE}
